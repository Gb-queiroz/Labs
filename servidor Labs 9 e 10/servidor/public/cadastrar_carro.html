<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Carro</title>
    <link rel="stylesheet" href="style_carros.css">
</head>

<body>
    <div class="container">
        <h1>Cadastrar Novo Carro</h1>

        <form action="/cadastrar_carro" method="POST">
            <div class="form-group">
                <label for="marca">Marca:</label>
                <input type="text" id="marca" name="marca" required>
            </div>

            <div class="form-group">
                <label for="modelo">Modelo:</label>
                <input type="text" id="modelo" name="modelo" required>
            </div>

            <div class="form-group">
                <label for="ano">Ano:</label>
                <input type="number" id="ano" name="ano" required>
            </div>

            <div class="form-group">
                <label for="qtde_disponivel">Quantidade Disponível:</label>
                <input type="number" id="qtde_disponivel" name="qtde_disponivel" required>
            </div>

            <button type="submit" class="btn-submit">Cadastrar Carro</button>
        </form>

        <a href="/gerencia_carros" class="btn-voltar">Voltar à Gerência</a>
    </div>
</body>

</html>
