<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Post</title>
    <link rel="stylesheet" href="style_cadastro_post.css">
</head>

<body>
    <div class="container">
        <h1>Cadastrar Novo Post</h1>

        <form action="/cadastrar_post" method="POST">
            <div class="form-group">
                <label for="titulo">Título:</label>
                <input type="text" id="titulo" name="titulo" required>
            </div>

            <div class="form-group">
                <label for="resumo">Resumo:</label>
                <input type="text" id="resumo" name="resumo" required>
            </div>

            <div class="form-group">
                <label for="conteudo">Conteúdo:</label>
                <textarea id="conteudo" name="conteudo" rows="6" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Cadastrar Post</button>
        </form>

        <a href="/blog" class="btn-voltar">Voltar ao Blog</a>
    </div>
</body>

</html>
