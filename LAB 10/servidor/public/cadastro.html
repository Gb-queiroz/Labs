<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <h2>Cadastro de Usuário</h2>

        <label>Nome:</label><br>
        <input type="text" id="nome"><br><br>

        <label>Login:</label><br>
        <input type="text" id="login"><br><br>

        <label>Senha:</label><br>
        <input type="password" id="senha"><br><br>

        <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <script>
        function cadastrar() {
            const nome = document.getElementById('nome').value;
            const login = document.getElementById('login').value;
            const senha = document.getElementById('senha').value;

            fetch('/cadastrar_usuario', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `nome=${encodeURIComponent(nome)}&login=${encodeURIComponent(login)}&senha=${encodeURIComponent(senha)}`
            }).then(res => {
                if (res.redirected) window.location.href = res.url;
                else return res.text().then(html => document.write(html));
            });
        }
    </script>
</body>

</html>
